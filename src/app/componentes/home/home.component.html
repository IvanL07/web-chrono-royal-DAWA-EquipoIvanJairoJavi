<main class="py-5 text-center">

  <header>
    <div class="container d-flex justify-content-center mt-4 mb-2">
      <a
        class="btn cr-btn-outline border border-white border-opacity-25 rounded-pill px-4 px-sm-5 py-2 py-sm-3 text-uppercase fw-semibold text-decoration-none shadow-sm text-nowrap cr-hero-title rounded-4"
        (click)="goNuevaColeccion()">
        — NUEVA COLECCIÓN —
      </a>
    </div>

    <p class="text-secondary">Timeless Prestige Collection</p>
    <br />
  </header>

  <div class="carousel slide cr-frame rounded-4 overflow-hidden shadow"
       data-bs-interval="4000"
       data-bs-ride="carousel"
       id="newCollectionCarousel">

    <div class="carousel-indicators">
      <button type="button" data-bs-target="#newCollectionCarousel" data-bs-slide-to="0"
              class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#newCollectionCarousel" data-bs-slide-to="1"
              aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#newCollectionCarousel" data-bs-slide-to="2"
              aria-label="Slide 3"></button>
    </div>

    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="assets/imgs/slider-nueva-coleccion-rolex-1.png"
             alt="Rolex — Nueva Colección"
             class="d-block w-100 cr-hero-img object-fit-cover" />
      </div>

      <div class="carousel-item">
        <img src="assets/imgs/slider-nueva-coleccion-rolex-2.png"
             alt="Patek Philippe — Nueva Colección"
             class="d-block w-100 cr-hero-img object-fit-cover" />
      </div>

      <div class="carousel-item">
        <img src="assets/imgs/slider-nueva-coleccion-rolex-3.png"
             alt="Richard Mille — Nueva Colección"
             class="d-block w-100 cr-hero-img object-fit-cover" />
      </div>
    </div>

    <button class="carousel-control-prev" type="button"
            data-bs-target="#newCollectionCarousel" data-bs-slide="prev">
      <span class="d-flex align-items-center justify-content-center rounded-circle p-1 p-lg-2 bg-dark bg-opacity-50">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      </span>
      <span class="visually-hidden">Anterior</span>
    </button>

    <button class="carousel-control-next" type="button"
            data-bs-target="#newCollectionCarousel" data-bs-slide="next">
      <span class="d-flex align-items-center justify-content-center rounded-circle p-1 p-lg-2 bg-dark bg-opacity-50">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
      </span>
      <span class="visually-hidden">Siguiente</span>
    </button>

  </div>

  <div class="cr-divider mt-5 mb-2"></div>

</main>

</section>
