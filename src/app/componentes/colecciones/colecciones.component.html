<main class="min-vh-100 py-5 border-top border-secondary-subtle">

  <header class="text-center">
    <div class="container">
      <h1 class="cr-display text-white text-uppercase">Colecciones</h1>

      <p class="text-secondary">
        Explora nuestra selección premium de alta relojería.
      </p>

      <span class="text-secondary small">
        {{ productos.length }} producto(s)
      </span>
    </div>

    <br>
  </header>

  <section class="pb-5">
    <div class="container">

      <div
        *ngIf="productos.length === 0"
        class="text-center text-secondary">
        No hay productos con esos filtros.
      </div>

      <div
        *ngIf="productos.length > 0"
        class="row g-4">

        <div
          class="col-12 col-md-6 col-lg-4"
          *ngFor="let p of productos">

          <div class="cr-product-card h-100">

            <img
              [src]="p.images[0]"
              [alt]="p.name"
              class="cr-product-img">

            <div class="p-4">

              <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                  <div class="fw-semibold">
                    {{ p.name }}
                  </div>

                  <div class="text-secondary small">
                    {{ p.brand }}
                  </div>
                </div>

                <span class="cr-pill rounded-pill px-3 py-1">
                  Premium
                </span>
              </div>

              <div class="mt-3">

                <div class="d-flex justify-content-between align-items-center gap-2">
                  <div class="cr-price mb-0">
                    {{ formatEUR(p.price) }}
                  </div>

                  <button
                    class="btn cr-btn-gold btn-sm text-nowrap"
                    type="button"
                    (click)="addToCart(p)">
                    Añadir al carrito
                  </button>
                </div>

                <a
                  class="btn cr-btn-outline btn-sm w-100 mt-3"
                  [routerLink]="['/producto']"
                  [queryParams]="{ id: p.id }">
                  Ver producto
                </a>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>
  </section>

</main>
