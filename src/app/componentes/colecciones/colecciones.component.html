<!-- HERO -->
<header class="text-center py-5">
  <div class="container">
    <h1 class="cr-display text-white text-uppercase">Colecciones</h1>

    <p class="text-secondary">
      Explora nuestra selección premium de alta relojería.
    </p>

    <span class="text-secondary small">
      {{ productos.length }} producto(s)
    </span>
  </div>
</header>

<!-- GRID -->
<section class="pb-5">
  <div class="container">

    <!-- Si no hay productos -->
    <div *ngIf="productos.length === 0"
         class="text-center text-secondary">
      No hay productos con esos filtros.
    </div>

    <!-- Grid -->
    <div class="row g-4" *ngIf="productos.length > 0">

      <div class="col-12 col-sm-6 col-md-4 col-lg-3"
           *ngFor="let p of productos">

        <!-- Tarjeta -->
        <div class="card cr-card h-100 d-flex flex-column">

          <!-- Imagen -->
          <div class="ratio ratio-4x3">
            <img [src]="p.images[0]"
                 class="w-100 h-100 object-fit-contain cr-card-img"
                 alt="{{ p.name }}">
          </div>

          <!-- Contenido -->
          <div class="card-body p-4 d-flex flex-column">

            <!-- Nombre + marca IZQUIERDA, badge DERECHA -->
            <div class="d-flex justify-content-between align-items-start gap-2">

              <!-- Nombre + marca -->
              <div class="text-start">
                <div class="fw-semibold text-white">{{ p.name }}</div>
                <div class="text-secondary small">{{ p.brand }}</div>
              </div>

              <!-- Badge -->
              <span class="badge rounded-pill border border-warning border-opacity-25 bg-warning bg-opacity-10 text-light px-3 py-1">
                Premium
              </span>

            </div>

            <!-- BLOQUE INFERIOR (precio + botones) SIEMPRE ABAJO -->
            <div class="mt-auto">

              <div class="d-flex justify-content-between align-items-center gap-2">
                <div class="cr-price fw-bold mb-0">
                  {{ p.price | currency:'EUR':'symbol':'1.0-0' }}
                </div>

                <button class="btn cr-btn-gold rounded-4 btn-sm text-nowrap"
                        (click)="addToCart(p)">
                  Añadir al carrito
                </button>
              </div>

              <a [routerLink]="['/producto']"
                 [queryParams]="{ id: p.id }"
                 class="btn cr-btn-outline rounded-4 btn-sm w-100 mt-3">
                Ver producto
              </a>

            </div>

          </div>
        </div>

      </div>

    </div>

  </div>
</section>
